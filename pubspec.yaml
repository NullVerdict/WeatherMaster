name: weather_master_app
description: "A new Flutter project."
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: "none" # Remove this line if you wish to publish to pub.dev

# The following defines the version and build number for your application.
# A version number is three numbers separated by dots, like 1.2.43
# followed by an optional build number separated by a +.
# Both the version and the builder number may be overridden in flutter
# build by specifying --build-name and --build-number, respectively.
# In Android, build-name is used as versionName while build-number used as versionCode.
# Read more about Android versioning at https://developer.android.com/studio/publish/versioning
# In iOS, build-name is used as CFBundleShortVersionString while build-number is used as CFBundleVersion.
# Read more about iOS versioning at
# https://developer.apple.com/library/archive/documentation/General/Reference/InfoPlistKeyReference/Articles/CoreFoundationKeys.html
# In Windows, build-name is used as the major, minor, and patch parts
# of the product and file versions while build-number is used as the build suffix.
version: 2.6.6+27

environment:
  sdk: ">=3.0.6 <4.0.0"
  flutter: ">=3.32.4"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  http: ^1.6.0
  material_color_utilities: ^0.11.1
  animations: ^2.1.1
  flutter_svg: ^2.2.3
  lottie: ^3.3.2
  lat_lng_to_timezone: ^0.2.0
  shared_preferences: ^2.5.3
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.5
  provider: ^6.1.5
  connectivity_plus: ^6.1.5
  restart_app: ^1.3.2
  intl: ^0.20.2
  material_symbols_icons: ^4.2892.0
  flutter_compass: ^0.8.1
  dynamic_color: ^1.8.1
  xml: ^6.6.1
  fl_chart: ^1.1.1
  easy_localization: ^3.0.8
  url_launcher: ^6.3.2
  reorderable_grid_view: ^2.2.8
  custom_refresh_indicator: ^4.0.1
  flutter_markdown: ^0.7.7+1
  solar_calculator: ^1.0.3
  file_picker: ^10.3.7
  flutter_dotenv: ^5.2.1
  home_widget: ^0.8.1
  permission_handler: ^12.0.1
  moon_phase: ^1.1.3
  flex_color_picker: ^3.8.0
  flutter_displaymode: ^0.6.0

  settings_tiles:
    path: ./settings_tiles_custom

  expressive_loading_indicator:
    path: ./expressive_loading_indicator_modified

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/weather-icons/
    - assets/foreground-animations/
    - assets/translations/
    - assets/froggie/
    - .env

  fonts:
    - family: DefaultFont
      fonts:
        - asset: assets/fonts/nato-Medium.ttf
          weight: 400
        - asset: assets/fonts/nato-Medium.ttf
          weight: 500
        - asset: assets/fonts/nato-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/nato-Bold.ttf
          weight: 700

    - family: FlexFontEn
      fonts:
        - asset: assets/fonts/flex-Regular.ttf
          weight: 400
        - asset: assets/fonts/flex-Medium.ttf
          weight: 500
        - asset: assets/fonts/flex-Medium.ttf
          weight: 600
        - asset: assets/fonts/flex-Bold.ttf
          weight: 700